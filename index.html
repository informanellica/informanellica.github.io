<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Software Album | Informanellica</title>
  <meta name="description" content="Informanellica が公開しているフリーソフトウェアの一覧です。">
  <link rel="icon" href="./assets/img/benri-na-pdf-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="./assets/css/custom.css" rel="stylesheet">
</head>

<body>
<header>
  <div class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a href="./" class="navbar-brand d-flex align-items-center">
        <i class="bi bi-collection me-2"></i>
        <strong>Informanellica Software</strong>
      </a>
      <a href="https://github.com/informanellica" class="text-light text-decoration-none small">
        <i class="bi bi-github me-1"></i>GitHub
      </a>
    </div>
  </div>
</header>

<main>
  <section class="py-5 text-center container">
    <div class="row py-lg-4">
      <div class="col-lg-8 col-md-10 mx-auto">
        <h1 class="fw-light">Software Album</h1>
        <p class="lead text-body-secondary">
          公開中のフリーソフトの一覧です。最新版のダウンロード、オンラインマニュアル、更新履歴へのリンクをまとめています。
        </p>
      </div>
    </div>
  </section>

  <div class="album py-5 bg-body-tertiary">
    <div class="container">
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">

        <!-- benri-na-pdf -->
        <div class="col">
          <div class="card shadow-sm h-100">
            <img src="./assets/img/benri-na-pdf-screenshot.png"
                 class="card-img-top" alt="benri-na-pdf スクリーンショット">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">
                <img src="./assets/img/benri-na-pdf-icon.png" alt="" width="22" height="22" class="me-1">
                benri-na-pdf
              </h5>
              <p class="card-text flex-grow-1">
                スキャンPDFの編集に向いた、ブラウザ技術ベースの軽量 PDF エディタ。
                二値化・傾き補正・OCR・ページ並べ替え・結合などを 1 アプリで完結。
              </p>
              <div class="d-flex justify-content-between align-items-center mt-auto">
                <div class="btn-group">
                  <a href="https://informanellica.github.io/benri-na-pdf/" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-info-circle me-1"></i>詳細
                  </a>
                  <a href="https://informanellica.github.io/benri-na-pdf/manual.html" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-book me-1"></i>マニュアル
                  </a>
                  <a href="https://github.com/informanellica/benri-na-pdf/releases/latest"
                     class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-download me-1"></i>最新版
                  </a>
                </div>
                <small class="text-body-secondary">Windows</small>
              </div>
              <div class="mt-2 small text-body-secondary">
                <span class="me-2"><i class="bi bi-tag me-1"></i>v0.1.3</span>
                <a href="https://github.com/informanellica/benri-na-pdf/releases" class="text-body-secondary">
                  <i class="bi bi-clock-history me-1"></i>更新履歴
                </a>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<footer class="text-body-secondary py-4 border-top">
  <div class="container">
    <p class="mb-0">© Informanellica</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
